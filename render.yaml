services:
  - type: web
    name: motion-nova
    runtime: docker
    plan: free
    region: frankfurt
    branch: master
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - key: APP_NAME
        value: Motion Nova API
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: motion-nova-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: motion-nova-keyvalue
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: MCP_API_TOKEN
        generateValue: true
      - key: MCP_PUBLIC_URL
        value: https://motion-nova.onrender.com/mcp
      - key: MCP_TOOL_TIMEOUT_SECONDS
        value: "5"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ADMIN_IDLE_TIMEOUT_MINUTES
        value: "30"
      - key: SECURE_COOKIES
        value: "true"
      - key: COOKIE_DOMAIN
        value: ""
      - key: ALLOWED_ORIGINS
        value: https://motion-nova.onrender.com
      - key: RUN_DB_MIGRATIONS
        value: "true"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST_PATH
        value: /app/frontend-dist
      - key: UVICORN_HOST
        value: 0.0.0.0
      - key: UVICORN_RELOAD
        value: "false"
      - key: UVICORN_WORKERS
        value: "1"

  - type: keyvalue
    name: motion-nova-keyvalue
    plan: free
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: motion-nova-postgres
    databaseName: motion_nova
    user: motion_nova
    plan: free
    region: frankfurt
    postgresMajorVersion: "18"
    ipAllowList: []
